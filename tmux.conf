# ===== 前缀键 =====
set -g prefix C-a
unbind C-b
bind C-a send-prefix    # 连按两次 C-a 发送原生 C-a 到程序

# ===== 分屏（| 左右，- 上下，并继承当前目录）=====
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ===== 新建窗口用 n（继承当前目录）=====
unbind n          # 解绑默认的 next-window
unbind c          # 解绑默认的新建窗口
bind n new-window -c "#{pane_current_path}"

# ===== 切换上/下一个窗口 =====
# 方案 A：前缀 + H / L（vim 风格，推荐）
bind H previous-window
bind L next-window

# 方案 B：不需要前缀，Alt+h / Alt+l（最快）
bind -n M-h previous-window
bind -n M-l next-window

# ===== Alt+数字 直接跳到第 N 个窗口（无需前缀）=====
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ===== 配置热重载 =====
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# ===== 通用基础优化 =====
set -g base-index 1              # 窗口序号从 1 开始
setw -g pane-base-index 1        # 面板序号从 1 开始
set -g renumber-windows on       # 关闭窗口后自动重排

set -sg escape-time 0            # Esc 无延迟（vim 友好）
set -g history-limit 50000       # 加大滚动缓冲

set -g mouse on                  # 启用鼠标

# 真彩支持
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# 复制模式用 vi 键位
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
